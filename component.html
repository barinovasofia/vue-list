<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Vue Components Practice</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>

        body{
            padding-left: 20px;
        }
        .success { 
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb; }

        .error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb; }

        .warning {
        background: #fff3cd;
        color: #856404;
        border: 1px solid #ffeeba; }


        .notification {
        width: 300px;
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        display: flex;
        justify-content: space-between; }


        .profile {
            width: 300px;
        border: 1px solid #ddd;
        padding: 15px; margin: 10px 0;
        border-radius: 10px; }


        img {
        border-radius: 50%; }


        button {
        border-radius: 5px;
        border: 1px solid rgba(55, 55, 55, 0.742);
        background-color: rgba(193, 193, 193, 0.353);
        margin-left: 10px;
        cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <h1 style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">Практика с компонентами Vue</h1>
        
        <h2 style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">GitHub Profile</h2>
        <github-profile username="barinovasofia"></github-profile>
        
        <button @click="showNote = !showNote">Показать уведомление</button>
        <notification 
            v-if="showNote"
            type="success" 
            message="Всё работает!"
            @close="showNote = false"
        ></notification>
    </div>

    <script>
        const NotificationComponent = {
            props: ['type', 'message'],
            data() {
                return {
                    isVisible: true
                }
            },
            mounted() {
                setTimeout(() => {
                    this.isVisible = false;
                    this.$emit('close');
                }, 3000);
            },
            template: `
                <div v-if="isVisible" :class="['notification', type]">
                    <span>{{ message }}</span>
                    <button @click="isVisible = false; $emit('close')">×</button>
                </div>
            `
        };
        
        const GithubProfileComponent = {
            props: ['username'],
            data() {
                return {
                    user: null,
                    loading: true,
                    error: null
                }
            },
            async mounted() {
                try {
                    const response = await fetch(`https://api.github.com/users/${this.username}`);
                    if (!response.ok) throw new Error('Пользователь не найден');
                    this.user = await response.json();
                } catch (err) {
                    this.error = err.message;
                } finally {
                    this.loading = false;
                }
            },
            template: `
                <div class="profile">
                    <div v-if="loading">Загрузка...</div>
                    <div v-else-if="error">{{ error }}</div>
                    <div v-else>
                        <img :src="user.avatar_url" width="80" height="80">
                        <h3>{{ user.name || user.login }}</h3>
                        <p>Репозиториев: {{ user.public_repos }}</p>
                        <a :href="user.html_url" target="_blank">Открыть профиль</a>
                        <button @click="$emit('close')">Закрыть</button>
                    </div>
                </div>
            `
        };
        
        const app = Vue.createApp({
            data() {
                return {
                    showNote: false
                }
            }
        });
        
        app.component('notification', NotificationComponent);
        app.component('github-profile', GithubProfileComponent);
        
        app.mount('#app');
    </script>
</body>
</html>
