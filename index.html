<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список дел</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<style>
    body{
        background-color: rgba(224, 192, 254, 0.341);
        font-family: Arial, sans-serif;
    max-width: 500px;
    margin: 50px auto;
    padding: 20px;
    }

    #app{
        padding: 30px;
        background-color: white;
        width: 400px;
        border-radius: 20px;
        
    }


    input[type="text"]{
        flex: 1;
        border-radius: 10px;
        border: 1px solid rgb(110, 110, 110);
        padding-left: 10px;
        font-size: 16px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

button{
    padding: 10px 15px;
        border-radius: 10px;
        border: none;
        background-color: rgba(224, 192, 254, 0.607);
        font-size: 16px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    .add-todo {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    padding: 10px;
    margin: 5px 0;
    background: #f9f9f9;
    border-radius: 5px;
    display: flex;
    align-items: center;
    gap: 10px;
}

li span {
    flex: 1;
}

.done {
    text-decoration: line-through;
    color: #999;
}

.empty, .info {
    text-align: center;
    padding: 20px;
    color: #666;
}
</style>
<body>
    <div id="app">
        <h1>Мой список дел</h1>
        <div class="add-todo">
            <input type="text" placeholder="Что нужно сделать?" @keyup.enter="addTodo" v-model="newTodo">
            <button @click="addTodo">+ Добавить</button>
        </div>
        <ul>
            <li v-for="todo in todos" :key="todo.id">
                <input type="checkbox" v-model="todo.done">
                <span :class="{ done: todo.done }">{{ todo.text }}</span>
                <button @click="removeTodo(todo.id)">❌</button>
            </li>
        </ul>

        <p v-if="todos.length === 0" class="empty">Задач нет</p>
        <p v-else class="info">Выполнено: {{ completedCount }} / {{ todos.length }}</p>
    </div>

    <script>
        const app = Vue.createApp({
            data() {
                return {
                    newTodo: '',
                    todos: JSON.parse(localStorage.getItem('todos')) || [
                        { id: 1, text: 'Пройти курс по Vue', done: false },
                        { id: 2, text: 'Сделать проект "Список дел"', done: false }
                    ]
                }
            },
            computed: {
                completedCount() {
                    return this.todos.filter(todo => todo.done).length
                }
            },
            methods: {
                addTodo() {
                    if (this.newTodo.trim() === '') return
                    this.todos.push({
                        id: Date.now(),
                        text: this.newTodo,
                        done: false
                    })
                    this.newTodo = ''
                    this.saveToLocalStorage()
                },
                removeTodo(id) {
                    this.todos = this.todos.filter(todo => todo.id !== id)
                    this.saveToLocalStorage()
                },
                saveToLocalStorage() {
                    localStorage.setItem('todos', JSON.stringify(this.todos))
                }
            },
            watch: {
                todos: {
                    deep: true,
                    handler() {
                        this.saveToLocalStorage()
                    }
                }
            }
        })
        app.mount('#app')
    </script>
</body>
</html>
