<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список дел на Vuex</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.x/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/vuetify@3.x/dist/vuetify.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3.x/dist/vuetify.min.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/vuex@4/dist/vuex.global.js"></script>
</head>
<body>
    <div id="app">
        <v-app>
            <v-app-bar app color="purple" dark>
                <v-toolbar-title>Мой список дел (Vuex)</v-toolbar-title>
                <v-spacer></v-spacer>
                <v-btn to="/">Главная</v-btn>
                <v-btn to="/about">О проекте</v-btn>
                <v-btn to="/contact">Контакты</v-btn>
            </v-app-bar>

            <v-main>
                <v-container class="fill-height" style="min-height: 100vh;">
                    <v-row justify="center" align="center">
                        <v-col cols="12" md="8" lg="6">
                            <router-view></router-view>
                        </v-col>
                    </v-row>
                </v-container>
            </v-main>
        </v-app>
    </div>

    <script>
        const { createApp } = Vue;
        const { createVuetify } = Vuetify;
        const { createRouter, createWebHashHistory } = VueRouter;
        const { createStore } = Vuex;
        const savedTodos = JSON.parse(localStorage.getItem('todos_vuex')) || [
            { id: 1, text: 'Выучить Vuex', done: false },
            { id: 2, text: 'Сделать проект с Vuex', done: false }
        ];
        const store = createStore({
            state() {
                return {
                    todos: savedTodos
                }
            },
            getters: {
                completedCount(state) {
                    return state.todos.filter(todo => todo.done).length
                },
                totalCount(state) {
                    return state.todos.length
                },
                remainingCount(state, getters) {
                    return getters.totalCount - getters.completedCount
                }
            },
            mutations: {
                ADD_TODO(state, todo) {
                    state.todos.push(todo);
                },
                REMOVE_TODO(state, id) {
                    state.todos = state.todos.filter(todo => todo.id !== id);
                },
                CLEAR_COMPLETED(state) {
                    state.todos = state.todos.filter(todo => !todo.done);
                },
                SET_TODOS(state, todos) {
                    state.todos = todos;
                }
            },
            actions: {

                addTodo({ commit }, newTodoText) {
                    if (newTodoText.trim() === '') return;
                    const newTodo = {
                        id: Date.now(),
                        text: newTodoText,
                        done: false
                    };
                    commit('ADD_TODO', newTodo);
                },
                removeTodo({ commit }, id) {
                    commit('REMOVE_TODO', id);
                },
                clearCompleted({ commit }) {
                    commit('CLEAR_COMPLETED');
                },

                saveTodos({ state }) {
                    localStorage.setItem('todos_vuex', JSON.stringify(state.todos));
                }
            }
        });

        store.watch(
            (state) => state.todos,
            (newTodos) => {
                localStorage.setItem('todos_vuex', JSON.stringify(newTodos));
            },
            { deep: true }
        );

        const TodoList = {
            data() {
                return {
                    newTodo: ''
                }
            },
            computed: {
                todos() {
                    return this.$store.state.todos;
                },
                completedCount() {
                    return this.$store.getters.completedCount;
                },
                remainingCount() {
                    return this.$store.getters.remainingCount;
                }
            },
            methods: {
                addTodo() {
                    this.$store.dispatch('addTodo', this.newTodo);
                    this.newTodo = '';
                },
                removeTodo(id) {
                    this.$store.dispatch('removeTodo', id);
                },
                clearCompleted() {
                    this.$store.dispatch('clearCompleted');
                }
            },
            template: `
                <v-card elevation="10" rounded="lg">
                    <v-card-title class="text-h4 bg-purple pa-4 text-white">
                        Мой список дел
                        <v-spacer></v-spacer>
                        <v-chip color="white">
                            {{ todos.length }} задач
                        </v-chip>
                    </v-card-title>
                    
                    <v-divider></v-divider>
                    
                    <v-card-text class="pa-4">
                        <v-row>
                            <v-col cols="9">
                                <v-text-field
                                    v-model="newTodo"
                                    label="Что нужно сделать?"
                                    variant="outlined"
                                    hide-details
                                    @keyup.enter="addTodo"
                                    clearable
                                    prepend-inner-icon="mdi-plus-box"
                                ></v-text-field>
                            </v-col>
                            <v-col cols="3">
                                <v-btn color="purple" block size="large" @click="addTodo">
                                    Добавить
                                </v-btn>
                            </v-col>
                        </v-row>

                        <v-list class="mt-4" lines="two">
                            <v-list-item
                                v-for="todo in todos"
                                :key="todo.id"
                                :class="{ 'bg-grey-lighten-4': todo.done }"
                                class="mb-2 rounded"
                            >
                                <template v-slot:prepend>
                                    <v-checkbox
                                        v-model="todo.done"
                                        hide-details
                                        color="success"
                                    ></v-checkbox>
                                </template>
                                
                                <v-list-item-title 
                                    :class="{ 'text-decoration-line-through text-grey': todo.done }"
                                    class="text-body-1"
                                >
                                    {{ todo.text }}
                                </v-list-item-title>
                                
                                <template v-slot:append>
                                    <v-btn
                                        icon
                                        variant="text"
                                        color="error"
                                        @click="removeTodo(todo.id)"
                                    >
                                        <v-icon>mdi-delete</v-icon>
                                    </v-btn>
                                </template>
                            </v-list-item>
                            
                            <v-list-item v-if="todos.length === 0" class="text-center">
                                <v-list-item-title class="text-grey">
                                    Нет задач. Отдыхаем!
                                </v-list-item-title>
                            </v-list-item>
                        </v-list>
                    </v-card-text>
                    
                    <v-divider></v-divider>
                    
                    <v-card-actions class="pa-4">
                        <v-chip color="success" variant="flat">
                            Выполнено: {{ completedCount }}
                        </v-chip>
                        <v-chip color="info" variant="flat">
                            Осталось: {{ remainingCount }}
                        </v-chip>
                        <v-spacer></v-spacer>
                        <v-btn
                            v-if="todos.length > 0"
                            color="error"
                            variant="text"
                            @click="clearCompleted"
                        >
                            Очистить выполненные
                        </v-btn>
                    </v-card-actions>
                </v-card>
            `
        };
        const AboutPage = {
            template: `
                <v-card elevation="10" rounded="lg">
                    <v-card-title class="text-h4 bg-purple pa-4 text-white">
                        О проекте
                    </v-card-title>
                    <v-card-text class="pa-4">
                        <p>Это приложение создано в рамках обучения на платформе Октагон.</p>
                        <p>Использованные технологии:</p>
                        <ul class="ml-4">
                            <li>Vue 3</li>
                            <li>Vuetify 3</li>
                            <li>Vue Router 4</li>
                            <li>Vuex 4</li>
                        </ul>
                        <p>Автор: София Баринова</p>
                    </v-card-text>
                </v-card>
            `
        };

        const ContactPage = {
            template: `
                <v-card elevation="10" rounded="lg">
                    <v-card-title class="text-h4 bg-purple pa-4 text-white">
                        Контакты
                    </v-card-title>
                    <v-card-text class="pa-4">
                        <p>Связаться со мной можно по почте:</p>
                        <v-chip color="purple" variant="flat">
                            sofia.barinova@example.com
                        </v-chip>
                        <p class="mt-4">Или через GitHub:</p>
                        <v-chip color="purple" variant="flat">
                            github.com/barinovasofia
                        </v-chip>
                    </v-card-text>
                </v-card>
            `
        };

        const NotFound = {
            template: `
                <v-card elevation="10" rounded="lg">
                    <v-card-title class="text-h4 bg-purple pa-4 text-white">
                        404
                    </v-card-title>
                    <v-card-text class="pa-4 text-center">
                        <v-icon icon="mdi-emoticon-sad" size="64" color="purple"></v-icon>
                        <p class="text-h5 mt-4">Страница не найдена</p>
                        <v-btn color="purple" to="/">Вернуться на главную</v-btn>
                    </v-card-text>
                </v-card>
            `
        };
        const routes = [
            { path: '/', component: TodoList },
            { path: '/about', component: AboutPage },
            { path: '/contact', component: ContactPage },
            { path: '/:pathMatch(.*)*', component: NotFound }
        ];

        const router = createRouter({
            history: createWebHashHistory(),
            routes
        });

        const vuetify = createVuetify();
        const app = createApp({});

        app.use(vuetify);
        app.use(router);
        app.use(store);

        app.mount('#app');
    </script>
</body>
</html>
